<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Réponses</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0a0a0a;
      --card: #161618;
      --violet: #8b5cf6;
      --violet-light: #a78bfa;
      --violet-subtle: rgba(139, 92, 246, 0.08);
      --white: #ffffff;
      --gray: #71717a;
      --gray-light: #a1a1aa;
      --border: rgba(255, 255, 255, 0.06);
      --radius: 16px;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Login */
    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-card .lock-icon {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--violet-subtle);
      border: 1px solid rgba(139, 92, 246, 0.2);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .login-card .lock-icon svg { width: 22px; height: 22px; color: var(--violet-light); }
    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-card p {
      color: var(--gray);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .login-card input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      color: var(--white);
      outline: none;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 16px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .login-card input:focus {
      border-color: rgba(139, 92, 246, 0.4);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
    }
    .login-card input::placeholder { letter-spacing: 0; color: var(--gray); }
    .login-error {
      color: #f87171;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }
    .login-btn {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg, var(--violet), #7c3aed);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: box-shadow 0.3s, transform 0.2s;
    }
    .login-btn:hover {
      box-shadow: 0 6px 28px rgba(139, 92, 246, 0.4);
      transform: translateY(-1px);
    }

    /* Dashboard */
    .dashboard { display: none; }
    .dashboard.visible { display: block; }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--black);
      z-index: 10;
    }
    .topbar h1 { font-size: 20px; font-weight: 600; }
    .topbar-actions { display: flex; gap: 10px; }
    .topbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--gray-light);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .topbar-btn:hover { background: rgba(255,255,255,0.06); color: var(--white); }
    .topbar-btn svg { width: 16px; height: 16px; }

    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      padding: 24px 32px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
    }
    .stat-label { font-size: 13px; color: var(--gray); margin-bottom: 6px; }
    .stat-value { font-size: 28px; font-weight: 700; }
    .stat-value.violet { color: var(--violet-light); }

    /* Response cards */
    .responses-list { padding: 8px 32px 48px; }
    .response-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      animation: fade-in 0.4s ease;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .response-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .response-person {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .response-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--violet), #7c3aed);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      flex-shrink: 0;
    }
    .response-name {
      font-size: 16px;
      font-weight: 600;
    }
    .response-meta {
      font-size: 12px;
      color: var(--gray);
    }
    .response-date {
      font-size: 13px;
      color: var(--violet-light);
      font-weight: 500;
      text-align: right;
    }
    .response-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .response-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .response-field.full { grid-column: 1 / -1; }
    .field-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--gray);
      font-weight: 600;
    }
    .field-value {
      font-size: 14px;
      color: var(--white);
      line-height: 1.5;
    }
    .field-value .pill {
      display: inline-flex;
      padding: 4px 12px;
      border-radius: 100px;
      background: var(--violet-subtle);
      border: 1px solid rgba(139, 92, 246, 0.2);
      font-size: 13px;
      color: var(--violet-light);
    }
    .conviction-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 14px;
      font-weight: 600;
    }
    .conviction-low { background: rgba(248,113,113,0.1); color: #f87171; border: 1px solid rgba(248,113,113,0.2); }
    .conviction-mid { background: rgba(251,191,36,0.1); color: #fbbf24; border: 1px solid rgba(251,191,36,0.2); }
    .conviction-high { background: rgba(52,211,153,0.1); color: #34d399; border: 1px solid rgba(52,211,153,0.2); }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--gray);
    }
    .empty-state h2 { font-size: 20px; color: var(--white); margin-bottom: 8px; }

    @media (max-width: 600px) {
      .topbar { padding: 16px; flex-direction: column; gap: 12px; align-items: flex-start; }
      .stats-row, .responses-list { padding-left: 16px; padding-right: 16px; }
      .response-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-screen" id="login-screen">
    <div class="login-card">
      <div class="lock-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Espace Admin</h1>
      <p>Accès réservé — entre ton mot de passe</p>
      <input type="password" id="password-input" placeholder="Mot de passe" autofocus>
      <div class="login-error" id="login-error">Mot de passe incorrect</div>
      <button class="login-btn" onclick="login()">Accéder au dashboard</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <div class="topbar">
      <h1>Réponses du formulaire</h1>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="refreshData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/></svg>
          Rafraîchir
        </button>
        <button class="topbar-btn" onclick="exportCSV()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Exporter CSV
        </button>
      </div>
    </div>

    <div class="stats-row" id="stats-row"></div>
    <div class="responses-list" id="responses-list"></div>
  </div>

  <script>
    let password = '';

    function login() {
      password = document.getElementById('password-input').value;
      fetch(`/api/responses?password=${encodeURIComponent(password)}`)
        .then(r => {
          if (!r.ok) throw new Error('bad');
          return r.json();
        })
        .then(data => {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard').classList.add('visible');
          renderDashboard(data);
        })
        .catch(() => {
          document.getElementById('login-error').style.display = 'block';
        });
    }

    document.getElementById('password-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') login();
    });

    function refreshData() {
      fetch(`/api/responses?password=${encodeURIComponent(password)}`)
        .then(r => r.json())
        .then(renderDashboard);
    }

    function exportCSV() {
      window.open(`/api/export?password=${encodeURIComponent(password)}`);
    }

    function renderDashboard(data) {
      renderStats(data);
      renderResponses(data);
    }

    function renderStats(data) {
      const total = data.length;
      const avgConviction = total > 0
        ? (data.reduce((s, r) => s + (parseInt(r.conviction) || 0), 0) / total).toFixed(1)
        : '—';

      const discoveryCount = {};
      data.forEach(r => {
        if (r.discovery) discoveryCount[r.discovery] = (discoveryCount[r.discovery] || 0) + 1;
      });
      const topDiscovery = Object.entries(discoveryCount).sort((a, b) => b[1] - a[1])[0];

      document.getElementById('stats-row').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">Total réponses</div>
          <div class="stat-value violet">${total}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Conviction moyenne</div>
          <div class="stat-value">${avgConviction}<span style="font-size:16px;color:var(--gray)">/10</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Canal #1</div>
          <div class="stat-value" style="font-size:18px">${topDiscovery ? topDiscovery[0] : '—'}</div>
        </div>
      `;
    }

    function convictionClass(val) {
      const n = parseInt(val) || 0;
      if (n <= 4) return 'conviction-low';
      if (n <= 7) return 'conviction-mid';
      return 'conviction-high';
    }

    function esc(str) {
      if (!str) return '<span style="color:var(--gray);font-style:italic">—</span>';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function initials(prenom, nom) {
      return ((prenom || '')[0] || '') + ((nom || '')[0] || '');
    }

    function renderResponses(data) {
      const container = document.getElementById('responses-list');

      if (data.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h2>Aucune réponse pour l'instant</h2>
            <p>Les réponses apparaîtront ici dès que quelqu'un remplira le formulaire.</p>
          </div>
        `;
        return;
      }

      const reversed = [...data].reverse();
      container.innerHTML = reversed.map((r, i) => `
        <div class="response-card" style="animation-delay: ${i * 0.05}s">
          <div class="response-header">
            <div class="response-person">
              <div class="response-avatar">${initials(r.prenom, r.nom).toUpperCase()}</div>
              <div>
                <div class="response-name">${esc(r.prenom)} ${esc(r.nom)}</div>
                <div class="response-meta">#${reversed.length - i}</div>
              </div>
            </div>
            <span class="response-date">${esc(r.date)}</span>
          </div>
          <div class="response-grid">
            <div class="response-field">
              <span class="field-label">Découverte</span>
              <span class="field-value"><span class="pill">${esc(r.discovery)}</span></span>
            </div>
            <div class="response-field">
              <span class="field-label">Conviction avant appel</span>
              <span class="field-value"><span class="conviction-badge ${convictionClass(r.conviction)}">${r.conviction || '—'}/10</span></span>
            </div>
            <div class="response-field full">
              <span class="field-label">Pourquoi moi</span>
              <span class="field-value">${esc(r['why-me'])}</span>
            </div>
            <div class="response-field full">
              <span class="field-label">Déclic conversion</span>
              <span class="field-value">${esc(r['conversion-trigger'])}</span>
            </div>
            <div class="response-field full">
              <span class="field-label">Supports ayant renforcé</span>
              <span class="field-value">${esc(r['support-content'])}</span>
            </div>
            <div class="response-field full">
              <span class="field-label">Hésitations</span>
              <span class="field-value">${esc(r.hesitations)}</span>
            </div>
            <div class="response-field full">
              <span class="field-label">Alternatives considérées</span>
              <span class="field-value">${esc(r.alternatives)}</span>
            </div>
            <div class="response-field">
              <span class="field-label">Temps de décision</span>
              <span class="field-value"><span class="pill">${esc(r['decision-time'])}</span></span>
            </div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
